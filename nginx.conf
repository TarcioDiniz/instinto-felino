server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão (HTML/CSS/JS/SVG)
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache longo só para imagens (não mudam com frequência)
    location ~* \.(?:png|jpe?g|gif|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # CSS/JS sempre revalidados (pega updates de deploy na hora)
    location ~* \.(?:css|js)$ {
        add_header Cache-Control "no-cache";
    }

    # HTML sempre revalidado
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
